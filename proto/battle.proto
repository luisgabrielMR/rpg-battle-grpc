syntax = "proto3";

package rpg.battle;

service BattleService {
  rpc GetStatus(StatusRequest) returns (BattleState);
  rpc Attack(ActionRequest) returns (ActionResult);
  rpc UsePotion(ActionRequest) returns (ActionResult);
  rpc ResetBattle(ResetRequest) returns (ActionResult);
}

service FileService {
  rpc UploadFile(stream FileChunk) returns (FileTransferResult);
  rpc ListFiles(ListFilesRequest) returns (FileList);
  rpc DownloadFile(FileRequest) returns (stream FileChunk);
}

message StatusRequest {}

message ResetRequest {}

message ActionRequest {
  string actor_name = 1;
}

message Combatant {
  string name = 1;
  string role = 2;
  int32 hp = 3;
  int32 max_hp = 4;
  bool alive = 5;
}

enum BattleOutcome {
  BATTLE_IN_PROGRESS = 0;
  PLAYER_WON = 1;
  MONSTER_WON = 2;
}

message BattleState {
  Combatant player = 1;
  Combatant monster = 2;
  BattleOutcome outcome = 3;
  int32 potions_left = 4;
  int32 turn = 5;
  repeated string log = 6;
}

message ActionResult {
  bool success = 1;
  string message = 2;
  BattleState state = 3;
}

message ListFilesRequest {}

message FileRequest {
  string file_name = 1;
}

message FileChunk {
  string file_name = 1;
  bytes content = 2;
}

message StoredFile {
  string file_name = 1;
  int64 size_bytes = 2;
}

message FileList {
  repeated StoredFile files = 1;
}

message FileTransferResult {
  bool success = 1;
  string message = 2;
  string file_name = 3;
  int64 size_bytes = 4;
}
